name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Select publish directory
        id: publish
        shell: bash
        run: |
          publish_dir=""

          for candidate in ".output/public" "dist/client" "dist"; do
            if [ -f "$candidate/index.html" ]; then
              publish_dir="$candidate"
              break
            fi

            if [ -f "$candidate/ai-study-companion/index.html" ]; then
              cp "$candidate/ai-study-companion/index.html" "$candidate/index.html"
              publish_dir="$candidate"
              break
            fi
          done

          if [ -z "$publish_dir" ]; then
            echo "No index.html found in supported publish directories" >&2
            find . -path "./node_modules" -prune -o -name "index.html" -print
            exit 1
          fi

          touch "$publish_dir/.nojekyll"
          cp "$publish_dir/index.html" "$publish_dir/404.html"

          echo "path=$publish_dir" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.publish.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
